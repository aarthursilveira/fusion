version: "3.9"

services:

  # ── Banco de dados ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fusion_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - fusion_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Aplicação (backend + frontend) ─────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fusion_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Banco
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      # NextFit (preencher amanhã)
      NEXTFIT_API_URL: ${NEXTFIT_API_URL}
      NEXTFIT_API_TOKEN: ${NEXTFIT_API_TOKEN}
      # App
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  fusion_db_data:
